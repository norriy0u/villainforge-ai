<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villain Origin — Forge Your Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --blood: #8a0303;
            --blood-dark: #4a0101;
            --ember: #ff3300;
            --paper: #bfab8a;
            --font-head: 'Cinzel Decorative', serif;
            --font-body: 'Crimson Text', serif;
            --font-mono: 'Share Tech Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; background:var(--black); color:#fff; font-family:var(--font-body); user-select:none; }

        /* Embers Base */
        .ember-container { position:fixed; inset:0; pointer-events:none; z-index:1; }
        .ember {
            position:absolute; bottom:-10px; width:4px; height:4px;
            background:radial-gradient(circle, #fff, var(--ember), transparent);
            border-radius:50%; filter:blur(1px);
            animation: floatEmber linear forwards; opacity:0;
        }
        @keyframes floatEmber {
            0%{transform:translateY(0) scale(1); opacity:1}
            100%{transform:translateY(-100vh) scale(0.2); opacity:0}
        }

        .page { position:fixed; inset:0; display:none; flex-direction:column; z-index:10; overflow:auto;}
        .page.active { display:flex; }

        /* ===== PAGE 1: HOOK ===== */
        #p1 { justify-content:center; align-items:center; text-align:center; }
        
        .lightning {
            position:absolute; inset:0; z-index:0;
            background:var(--blood); opacity:0; mix-blend-mode:color-dodge;
            clip-path: polygon(48% 0, 52% 0, 48% 30%, 55% 25%, 45% 60%, 52% 55%, 46% 100%, 42% 100%, 48% 60%, 42% 65%, 52% 30%, 45% 35%);
            animation: strike 8s infinite 2s;
        }
        @keyframes strike {
            0%, 5%, 8%, 100% {opacity:0}
            6%, 7% {opacity:0.6}
            9% {opacity:0.3}
        }

        .mist-silhouettes {
            position:absolute; bottom:0; left:0; width:100%; height:400px; z-index:0;
            background: radial-gradient(circle at 30% 100%, rgba(138,3,3,0.3) 0%, transparent 60%),
                        radial-gradient(circle at 70% 100%, rgba(138,3,3,0.2) 0%, transparent 50%);
            filter: blur(20px); opacity:0.8;
            animation: mistPulse 5s infinite alternate;
        }
        @keyframes mistPulse { from{opacity:0.5} to{opacity:0.9} }
        
        .hook-content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; gap:20px; }
        .hook-text { font-family:var(--font-head); font-size:3rem; text-shadow:0 0 20px var(--blood-dark); line-height:1.2; }
        .hook-sub { font-family:var(--font-head); font-size:4rem; color:var(--blood); margin-bottom:40px; text-shadow:0 0 30px var(--ember); opacity:0; animation:fadeIn 2s 2s forwards; }
        @keyframes fadeIn { to{opacity:1} }
        
        .cta-btn {
            font-family:var(--font-head); font-size:1.5rem; padding:15px 40px;
            background:transparent; color:var(--blood); border:2px solid var(--blood);
            cursor:pointer; position:relative; overflow:hidden; transition:all 0.3s;
            text-transform:uppercase; letter-spacing:4px; font-weight:700;
        }
        .cta-btn::before {
            content:''; position:absolute; inset:0; background:var(--blood-dark);
            z-index:-1; transform:scaleY(0); transform-origin:bottom; transition:transform 0.4s;
        }
        .cta-btn:hover { color:#fff; border-color:var(--ember); box-shadow:0 0 40px var(--blood-dark); }
        .cta-btn:hover::before { transform:scaleY(1); }
        
        /* Cracked surface hover effect */
        .cta-btn.cracked {
            background-image: linear-gradient(45deg, transparent 48%, #000 49%, #000 51%, transparent 52%),
                              linear-gradient(-45deg, transparent 48%, #000 49%, #000 51%, transparent 52%);
            background-size: 20px 20px;
        }

        /* ===== PAGE 2: DOSSIER INPUT ===== */
        #p2 { justify-content:center; align-items:center; background:#080000; }
        
        .dossier {
            width:90%; max-width:600px; background:#110202; border:1px solid #300;
            padding:40px; border-radius:4px; box-shadow:0 20px 60px rgba(0,0,0,0.9), inset 0 0 100px rgba(40,0,0,0.5);
            position:relative; z-index:10;
        }
        .dossier-header {
            font-family:var(--font-mono); font-size:1.5rem; color:var(--blood);
            text-align:center; letter-spacing:5px; margin-bottom:30px;
            border-bottom:2px dashed #400; padding-bottom:15px;
        }
        
        .form-row { margin-bottom:25px; opacity:0; transform:translateY(20px); }
        .form-row.slide-in { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { to{opacity:1;transform:translateY(0)} }
        
        .d-label { font-family:var(--font-mono); font-size:0.9rem; color:#888; display:block; margin-bottom:8px; text-transform:uppercase;}
        .d-input {
            width:100%; background:#000; border:1px solid #300; color:var(--paper);
            font-family:var(--font-mono); font-size:1.1rem; padding:10px; outline:none; transition:all 0.3s;
        }
        .d-input:focus { border-color:var(--blood); box-shadow:0 0 15px rgba(138,3,3,0.5); color:#fff; }
        
        .seal-btn {
            width:100%; font-family:var(--font-head); font-size:1.5rem; letter-spacing:4px;
            padding:15px; margin-top:20px; background:#200; color:#800; border:1px solid #400;
            cursor:pointer; transition:all 0.3s;
        }
        .seal-btn:hover { background:var(--blood-dark); color:var(--ember); border-color:var(--ember); box-shadow:inset 0 0 20px #000; }

        /* Shatter Animation Screen */
        .shatter-overlay {
            position:fixed; inset:0; background:#000; z-index:100; pointer-events:none;
            clip-path: circle(0% at 50% 50%); transition:clip-path 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .shatter-overlay.active { clip-path: circle(150% at 50% 50%); }

        /* ===== PAGE 3: ORIGIN REVEAL ===== */
        #p3 { justify-content:flex-start; align-items:center; background:#000; padding:40px 20px; overflow-y:auto; }
        
        .orb {
            width:100px; height:100px; border-radius:50%; margin:40px auto;
            background:radial-gradient(circle, #fff, var(--ember) 20%, var(--blood) 60%, transparent);
            box-shadow:0 0 50px var(--ember); animation:orbPulse 2s infinite alternate; transition:all 1s;
        }
        @keyframes orbPulse { from{transform:scale(0.9); opacity:0.8;} to{transform:scale(1.1); opacity:1;} }
        
        .loading-origin { font-family:var(--font-mono); font-size:1rem; color:var(--blood); text-align:center; letter-spacing:2px; animation:flicker 0.1s infinite alternate; }

        .reveal-container { display:none; max-width:800px; width:100%; text-align:center; z-index:5; padding-bottom:50px;}
        
        .villain-name {
            font-family:var(--font-head); font-size:clamp(3rem, 8vw, 6rem); color:#fff;
            text-transform:uppercase; letter-spacing:8px; margin-bottom:30px;
            text-shadow:0 0 30px var(--ember); line-height:1; display:flex; justify-content:center; flex-wrap:wrap;
        }
        .name-char { opacity:0; transform:scale(1.5) translateY(-20px); filter:blur(10px); }
        .name-char.revealed { animation: letterDrop 0.4s ease-out forwards; }
        @keyframes letterDrop { to{opacity:1; transform:scale(1) translateY(0); filter:blur(0);} }
        
        .portrait {
            width:300px; height:400px; margin:0 auto 40px; background:#111;
            border:4px solid #300; box-shadow:0 20px 50px rgba(0,0,0,0.8), 0 0 60px var(--blood-dark);
            position:relative; overflow:hidden;
        }
        .portrait img {
            width:100%; height:100%; object-fit:cover;
            filter: grayscale(100%) contrast(1.5) brightness(0.8);
            transition: filter 3s ease-in-out;
        }
        .portrait img.colorized { filter: grayscale(0%) contrast(1.2) brightness(1); }
        .portrait::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 50px #000; pointer-events:none; }

        .story-p {
            font-size:1.2rem; line-height:1.6; color:#ccc; text-align:justify;
            margin-bottom:20px; font-style:italic; opacity:0; transform:translateY(20px);
            text-shadow:0 2px 5px #000;
        }
        .story-p.visible { animation: storyScroll 1.5s ease-out forwards; }
        @keyframes storyScroll { to{opacity:1;transform:translateY(0)} }
        
        .continue-btn {
            font-family:var(--font-mono); font-size:1.2rem; padding:15px 30px;
            background:transparent; border:1px solid #444; color:#fff; cursor:pointer;
            transition:0.3s; margin-top:20px; letter-spacing:2px; opacity:0; transition:opacity 1s;
        }
        .continue-btn:hover { border-color:var(--blood); background:var(--blood-dark); box-shadow:0 0 20px var(--blood); }

        /* ===== PAGE 4: DOSSIER / GALLERY ===== */
        #p4 { background:#0a0a0a; padding:40px 20px; align-items:center; overflow-y:auto;}
        
        .dossier-card {
            width:100%; max-width:700px; background:linear-gradient(to bottom, #1a1a1a, #0d0d0d);
            border:2px solid #333; padding:30px; border-radius:8px; display:flex; gap:30px;
            box-shadow:0 10px 40px rgba(0,0,0,0.8); margin-bottom:40px; position:relative; overflow:hidden;
        }
        .dossier-card::before { content:'CONFIDENTIAL'; position:absolute; top:20px; right:20px; font-family:var(--font-mono); color:var(--blood); opacity:0.3; font-size:3rem; transform:rotate(-15deg); pointer-events:none; }
        
        .dc-img { width:150px; height:200px; object-fit:cover; border:2px solid #555; filter:sepia(0.5) contrast(1.2); }
        .dc-info { flex:1; display:flex; flex-direction:column; justify-content:center; }
        .dc-name { font-family:var(--font-head); font-size:2rem; color:var(--ember); margin-bottom:5px; }
        .dc-label { font-family:var(--font-mono); font-size:0.8rem; color:#888; margin-top:10px; text-transform:uppercase; }
        .dc-val { font-family:var(--font-body); font-size:1.1rem; color:#ccc; }
        
        .threat-meter {
            width:100%; height:15px; background:#222; border:1px solid #444; margin-top:5px; position:relative; overflow:hidden;
        }
        .threat-fill { height:100%; width:0%; background:linear-gradient(90deg, #ff0000, #ff9900); transition:width 1.5s ease-out; }
        
        .actions-row { display:flex; gap:15px; justify-content:center; margin-bottom:50px; }
        .act-btn { padding:12px 25px; font-family:var(--font-mono); font-size:1rem; background:#111; color:#fff; border:1px solid #333; cursor:pointer; }
        .act-btn:hover { background:var(--blood); border-color:var(--ember); }

        .gallery-title { font-family:var(--font-head); font-size:2rem; color:#888; text-align:center; margin-bottom:20px; letter-spacing:4px; }
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; width:100%; max-width:900px; margin-bottom:50px;}
        
        .g-card { background:#111; border:1px solid #222; padding:15px; cursor:pointer; transition:0.3s; }
        .g-card:hover { border-color:var(--blood); transform:scale(1.02); }
        .g-name { font-family:var(--font-head); color:var(--ember); font-size:1.2rem; margin-bottom:5px; }
        .g-trait { font-family:var(--font-mono); font-size:0.8rem; color:#aaa; margin-bottom:10px; }

        @media(max-width:700px) {
            .hook-sub { font-size:2.5rem; }
            .dossier-card { flex-direction:column; align-items:center; text-align:center; }
        }
    </style>
</head>
<body>

<div class="ember-container" id="ember-container"></div>
<div class="shatter-overlay" id="shatter"></div>

<!-- PAGE 1: HOOK -->
<div class="page active" id="p1">
    <div class="lightning"></div>
    <div class="mist-silhouettes"></div>
    <div class="hook-content">
        <div class="hook-text">Every villain has a reason.</div>
        <div class="hook-sub">What's yours?</div>
        <button class="cta-btn" id="cta-start" onmouseover="this.classList.add('cracked')" onmouseout="this.classList.remove('cracked')">FORGE MY ORIGIN</button>
    </div>
</div>

<!-- PAGE 2: DOSSIER INPUT -->
<div class="page" id="p2">
    <div class="dossier">
        <div class="dossier-header">CLASSIFIED ORIGIN FILE</div>
        <div class="form-row">
            <label class="d-label">YOUR NAME, FUTURE VILLAIN:</label>
            <input type="text" class="d-input" id="inp-name" autocomplete="off" placeholder="e.g. Victor">
        </div>
        <div class="form-row">
            <label class="d-label">THE BETRAYAL THAT STARTED IT ALL:</label>
            <input type="text" class="d-input" id="inp-betrayal" autocomplete="off" placeholder="e.g. They stole my research">
        </div>
        <div class="form-row">
            <label class="d-label">YOUR STRANGE POWER OR QUIRK:</label>
            <input type="text" class="d-input" id="inp-power" autocomplete="off" placeholder="e.g. Can control shadows">
        </div>
        <div class="form-row">
            <label class="d-label">YOUR ONE WEAKNESS:</label>
            <input type="text" class="d-input" id="inp-weakness" autocomplete="off" placeholder="e.g. True love">
        </div>
        <button class="seal-btn" id="btn-seal">SEAL MY FATE</button>
    </div>
</div>

<!-- PAGE 3: REVEAL -->
<div class="page" id="p3">
    <div class="orb" id="load-orb"></div>
    <div class="loading-origin" id="load-txt">Forging your destiny...</div>

    <div class="reveal-container" id="reveal-box">
        <div class="villain-name" id="v-title"></div>
        <div class="portrait">
            <img id="v-img" src="" alt="Villain Portrait">
        </div>
        <div id="v-story"></div>
        <button class="continue-btn" id="btn-view-dossier">VIEW COMPLETE DOSSIER</button>
    </div>
</div>

<!-- PAGE 4: DOSSIER / GALLERY -->
<div class="page" id="p4">
    <div class="dossier-card" id="final-dossier">
        <img id="d-img" src="" class="dc-img" alt="Villain">
        <div class="dc-info">
            <div class="dc-name" id="d-name"></div>
            
            <div class="dc-label">POWER / QUIRK</div>
            <div class="dc-val" id="d-power"></div>
            
            <div class="dc-label">KNOWN WEAKNESS</div>
            <div class="dc-val" id="d-weakness"></div>
            
            <div class="dc-label">THREAT LEVEL</div>
            <div class="threat-meter"><div class="threat-fill" id="t-fill"></div></div>
            <div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--ember);margin-top:2px;" id="t-lbl"></div>
        </div>
    </div>
    
    <div class="actions-row">
        <button class="act-btn" id="btn-dl">DOWNLOAD DOSSIER</button>
        <button class="act-btn" onclick="location.reload()">FORGE ANOTHER</button>
    </div>
    
    <div class="gallery-title">VILLAIN GALLERY</div>
    <div class="gallery-grid" id="gallery-grid">
        <!-- Community villains -->
    </div>
</div>

<script>
// ===== AUDIO ENGINE =====
let audioCtx;
function initAudio(){ if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }

function playSting(){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    // deep bass drone + minor chord
    const freqs=[65.41, 130.81, 155.56, 196.00]; // C2, C3, Eb3, G3
    freqs.forEach(f=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type='sawtooth'; o.frequency.value=f;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.1,t+0.1);
        g.gain.exponentialRampToValueAtTime(0.01,t+3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t+3);
    });
}

function playImpact(){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
    o.type='square'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(20,t+0.5);
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.5);
}

// ===== EMBERS SYSTEM =====
function spawnEmber(){
    const e = document.createElement('div');
    e.className='ember';
    e.style.left = Math.random()*100+'vw';
    e.style.animationDuration = (3+Math.random()*4)+'s';
    e.style.width = e.style.height = (2+Math.random()*4)+'px';
    document.getElementById('ember-container').appendChild(e);
    setTimeout(()=>e.remove(), 7000);
}
setInterval(spawnEmber, 300);

// ===== NAV =====
function goTo(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ===== PAGE 1 =====
document.getElementById('cta-start').addEventListener('click', ()=>{
    initAudio(); playSting();
    goTo('p2');
    
    // Stagger slide form fields
    const rows = document.querySelectorAll('.form-row');
    rows.forEach((r,i) => {
        setTimeout(()=>{ r.classList.add('slide-in'); }, i*150);
    });
});

// ===== PAGE 2 =====
let vData = {};

document.getElementById('btn-seal').addEventListener('click', ()=>{
    initAudio(); playImpact();
    
    // Pick random defaults if inputs are left completely blank!
    const rNames = ["Victor", "Malice", "Zephyr", "Lilith", "Cronos"];
    const rBetrayals = ["they stole my research", "my mentor left me for dead", "the kingdom banished me", "society rejected my vision", "I was framed for treason"];
    const rPowers = ["uncontrollable rage", "blood magic", "shadow manipulation", "technopathic control", "mind shattering illusions"];
    const rWeaknesses = ["basic empathy", "the light of the sun", "memory of my past", "hubris", "true love"];

    vData.name = document.getElementById('inp-name').value.trim() || rNames[Math.floor(Math.random()*rNames.length)];
    vData.betrayal = document.getElementById('inp-betrayal').value.trim() || rBetrayals[Math.floor(Math.random()*rBetrayals.length)];
    vData.power = document.getElementById('inp-power').value.trim() || rPowers[Math.floor(Math.random()*rPowers.length)];
    vData.weakness = document.getElementById('inp-weakness').value.trim() || rWeaknesses[Math.floor(Math.random()*rWeaknesses.length)];
    
    // Shatter screen
    const shat = document.getElementById('shatter');
    shat.classList.add('active');
    
    setTimeout(()=>{
        goTo('p3');
        shat.classList.remove('active');
        generateOrigin();
    }, 1000);
});

// ===== PAGE 3 =====
const TITLES = ["The Crimson", "Darth", "Lord", "The Shadow", "Doctor", "The Mad", "Phantom", "Emperor"];
const NOUNS = ["Architect", "Reaper", "Annihilator", "Wraith", "Oracle", "Devourer", "Nemesis"];

function generateOrigin(){
    // Gen Title
    const t = `${TITLES[Math.floor(Math.random()*TITLES.length)]} ${vData.name}`;
    vData.title = t;
    
    // Create Story Templates
    const templates = [
      {
        p1: `It wasn't always this way. Before the darkness, before they were known as <strong>{t}</strong>, they were just another soul. But then came the turning point: <em>{b}</em>. That single act of cruelty shattered the illusion of a just world.`,
        p2: `In the depths of their despair, a dormant ability awoke. They discovered they possessed <em>{p}</em>. At first, it was a curse. Soon, it became the weapon they would use to carve their retribution into reality.`,
        p3: `Now, the world trembles. Yet, whispers in the resistance say that <strong>{t}</strong> can be defeated, if one can exploit their fatal flaw: <em>{w}</em>. The board is set. The villain has risen.`
      },
      {
        p1: `No one is born wicked. The being known as <strong>{t}</strong> was forged in the fires of betrayal when <em>{b}</em>. From the ashes of their former life, a true monster was born.`,
        p2: `Fueled by vengeance, they harnessed a terrifying dark art: <em>{p}</em>. With this new found power, they decimated those who stood in their way, leaving only destruction in their wake.`,
        p3: `But every titan has a chink in their armor. Ancient texts reveal that <strong>{t}</strong> harbors a hidden vulnerability: <em>{w}</em>. Whether this will be enough to stop them remains to be seen.`
      },
      {
        p1: `History books will record <strong>{t}</strong> as a tyrant, but they omit the catalyst: <em>{b}</em>. When the world turned its back on them, they decided to break the world in return.`,
        p2: `To achieve their goals, they mastered <em>{p}</em>, bending the very laws of nature to their will. None could stand against the fury of their wrath.`,
        p3: `The heroes of this age cling to a single thread of hope. It is rumored that the key to unraveling <strong>{t}</strong> lies in their ultimate weakness: <em>{w}</em>. Only time will tell.`
      }
    ];

    const tmpl = templates[Math.floor(Math.random()*templates.length)];
    const p1 = tmpl.p1.replace(/\{t\}/g, t).replace(/\{b\}/g, vData.betrayal);
    const p2 = tmpl.p2.replace(/\{p\}/g, vData.power);
    const p3 = tmpl.p3.replace(/\{t\}/g, t).replace(/\{w\}/g, vData.weakness);
    
    // Generate Portrait (Pollinations)
    // We inject random salts to brutally bypass their caching network guaranteeing unique renders!
    const salt = Math.random().toString(36).substring(2, 8);
    const prompt=encodeURIComponent(`cinematic dark fantasy supervillain portrait of ${vData.name} wielding ${vData.power} dark lighting red ambiance highly detailed face unique render ${salt}`);
    const seed = Math.floor(Math.random() * 1000000);
    const imgSrc = `https://image.pollinations.ai/prompt/${prompt}?seed=${seed}&width=300&height=400&nologo=true&t=${Date.now()}`;
    
    const vImg = document.getElementById('v-img');
    vImg.src = imgSrc;
    
    // Sim Loading
    setTimeout(()=>{
        document.getElementById('load-orb').style.display = 'none';
        document.getElementById('load-txt').style.display = 'none';
        document.getElementById('reveal-box').style.display = 'block';
        
        // Split name for animation
        const titleEl = document.getElementById('v-title');
        t.split('').forEach((c,i)=>{
            const span = document.createElement('span');
            span.textContent = c===' '?'\u00A0':c;
            span.className = 'name-char';
            titleEl.appendChild(span);
            setTimeout(()=>span.classList.add('revealed'), i*100);
        });
        
        // Slowly colorize image
        setTimeout(()=>vImg.classList.add('colorized'), 1000);
        
        // Append story
        const storyEl = document.getElementById('v-story');
        [p1,p2,p3].forEach((txt,i)=>{
            const p = document.createElement('div');
            p.className = 'story-p';
            p.innerHTML = txt;
            storyEl.appendChild(p);
            setTimeout(()=>p.classList.add('visible'), 2000 + (i*1500));
        });
        
        setTimeout(()=>document.getElementById('btn-view-dossier').style.opacity=1, 7000);
        
    }, 2500); // 2.5s load
}

document.getElementById('btn-view-dossier').addEventListener('click', ()=>{
    initAudio(); playSting();
    goTo('p4');
    
    document.getElementById('d-img').src = document.getElementById('v-img').src;
    document.getElementById('d-name').textContent = vData.title;
    document.getElementById('d-power').textContent = vData.power;
    document.getElementById('d-weakness').textContent = vData.weakness;
    
    // Threat Meter
    const threatLvl = 50 + Math.random()*50; // 50-100%
    let tClass = "OMEGA LEVEL";
    if(threatLvl < 70) tClass = "ALPHA LEVEL";
    else if(threatLvl < 85) tClass = "DEMON CLASS";
    
    document.getElementById('t-lbl').textContent = `${tClass} DESTRUCTION POTENTIAL`;
    setTimeout(()=>{ document.getElementById('t-fill').style.width = `${threatLvl}%`; }, 500);
    
    populateGallery();
});

// ===== PAGE 4 =====
const DUMMY_LST = [
    {n:"Darth Priya", t:"Time Manipulation"}, {n:"The Shadow Aman", t:"Mind Control"},
    {n:"Lord Rahul", t:"Gravity Reversal"}, {n:"The Mad Divya", t:"Technopathy"}
];
function populateGallery(){
    const g = document.getElementById('gallery-grid');
    if(g.children.length>0) return;
    
    DUMMY_LST.forEach(v=>{
        const card = document.createElement('div');
        card.className = 'g-card';
        card.innerHTML = `<div class="g-name">${v.n}</div><div class="g-trait">POWER: ${v.t}</div>`;
        g.appendChild(card);
    });
}

document.getElementById('btn-dl').addEventListener('click', ()=>{
    const txt = `CLASSIFIED DOSSIER\n${'='.repeat(35)}\nNAME: ${vData.title}\nPOWER: ${vData.power}\nWEAKNESS: ${vData.weakness}\n${'='.repeat(35)}\nTheir origin:\n${vData.betrayal} drove them to darkness.\n\nGenerated by Villain Origin - VishwaNova 2026`;
    const b = new Blob([txt],{type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download=`Dossier_${vData.name}.txt`; a.click();
});
</script>
